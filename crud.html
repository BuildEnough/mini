<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        padding: 30px;
      }

      .container {
        width: 500px;
        margin: 0 auto;
        background-color: white;
        padding: 20px;
        border: 1px solid #ccc;
      }

      h1 {
        text-align: center;
      }

      input {
        width: 70%;
        padding: 8px;
        margin-right: 5px;
      }

      button {
        padding: 8px 10px;
        cursor: pointer;
      }

      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }

      li {
        display: flex;
        align-items: center;
        gap: 10px;
        background-color: #eee;
        margin-bottom: 10px;
        padding: 10px;
      }

      li input[type="checkbox"] {
        margin: 0;
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      li > div:first-child {
        flex: 1;
      }

      .btn-area {
        margin-left: auto;
      }

      .btn-area button {
        margin-right: 5px;
      }

      .done {
        text-decoration: line-through;
        color: gray;
      }

      /* 챗봇 모달 + 챗봇 UI 추가 */

      #openChat {
        margin-left: 10px;
        padding: 6px 12px;
        border: none;
        border-radius: 8px;
        background-color: cadetblue;
        color: white;
        cursor: pointer;
      }

      /* 모달 */
      .modal {
        display: none;
        position: fixed;
        z-index: 9999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
      }

      .modal-content {
        position: absolute;
        right: 20px;
        bottom: 20px;
      }

      #closeChat {
        position: absolute;
        top: -35px;
        right: 0;
        font-size: 28px;
        font-weight: bold;
        color: white;
        cursor: pointer;
      }

      /* 챗봇 박스 */
      .box {
        width: 360px;
        height: 600px;
        background-color: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .chat-container {
        list-style: none;
        margin: 0;
        padding: 15px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
      }

      .message {
        display: flex;
        flex-direction: column;
        max-width: 70%;
        position: relative;
      }

      .name {
        font-size: 12px;
        margin-bottom: 3px;
        color: gray;
      }

      .bubble {
        padding: 10px 12px;
        border-radius: 12px;
        line-height: 1.4;
        word-break: break-word;
      }

      .bot {
        align-self: flex-start;
      }

      .bot .bubble {
        background-color: #eee;
      }

      .user {
        align-self: flex-end;
        text-align: right;
      }

      .user .bubble {
        background-color: cadetblue;
        color: white;
      }

      .box .done .bubble {
        text-decoration: line-through;
        opacity: 0.5;
      }

      /* 챗봇 버튼 영역 */
      .actions {
        margin-top: 5px;
      }

      .actions button {
        font-size: 11px;
        margin-left: 5px;
        padding: 3px 6px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .edit-btn {
        background-color: #ffd966;
      }

      .delete-btn {
        background-color: #ff6b6b;
        color: white;
      }

      /* 챗봇 입력창  */
      .input-area {
        display: flex;
        padding: 10px;
        border-top: 1px solid #ddd;
        gap: 10px;
      }

      .input-area input {
        flex: 1;
        width: auto;
        padding: 10px;
        margin-right: 0;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
      }

      .input-area button {
        padding: 10px 15px;
        border: none;
        border-radius: 10px;
        background-color: cadetblue;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>
        과제
        <button id="openChat" type="button">챗봇</button>
      </h1>

      <input type="text" id="textInput" placeholder="내용을 입력하세요" />

      <button onclick="addItem()">추가</button>

      <ul id="list"></ul>
    </div>

    <!--  챗봇 모달 -->
    <div id="chatModal" class="modal">
      <div class="modal-content">
        <span id="closeChat">&times;</span>

        <div class="box">
          <ul class="chat-container" id="chat">
            <li class="message bot">
              <div class="name">myBot</div>
              <div class="bubble">안녕하세요! 무엇을 도와드릴까요? 😊</div>
            </li>
          </ul>

          <div class="input-area">
            <input type="text" id="input" placeholder="메시지 입력..." />
            <button id="send" type="button">전송</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 데이터를 저장 배열
      let items = [];

      // 페이지가 열리면 localStorage에 저장된 데이터를 불러옴
      window.onload = function () {
        let savedItems = localStorage.getItem("items");

        // 저장된 값이 있으면 배열로 변환해서 items에 넣음
        if (savedItems) {
          items = JSON.parse(savedItems);
        }
        renderList();
      };

      // create
      function saveItems() {
        localStorage.setItem("items", JSON.stringify(items));
      }

      // read
      function renderList() {
        let list = document.getElementById("list");

        list.innerHTML = "";

        // items 배열 길이만큼 반복
        for (let i = 0; i < items.length; i++) {
          let li = document.createElement("li"); // li 태그 생성

          let text = document.createElement("div"); // 내용 표시용 div 생성
          text.innerText = items[i];

          // 체크박스 시작
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";

          li.appendChild(checkbox);

          /* 체크 시 완료_SY */
          checkbox.addEventListener("change", () => {
            li.classList.toggle("done", checkbox.checked);
          });

          /* li 클릭 시 체크와 연동(토글)_SY */
          li.addEventListener("click", (e) => {
            if (e.target !== checkbox && e.target.tagName !== "BUTTON") {
              checkbox.checked = !checkbox.checked;
              li.classList.toggle("done", checkbox.checked);
            }
          });
          // 체크박스 종료

          let btnArea = document.createElement("div"); // 수정/삭제 버튼 영역 생성
          btnArea.className = "btn-area";

          let editBtn = document.createElement("button"); // 수정 버튼 생성
          editBtn.innerText = "수정";
          editBtn.onclick = function () {
            editItem(i);
          };

          let deleteBtn = document.createElement("button"); // 삭제 버튼 생성
          deleteBtn.innerText = "삭제";
          deleteBtn.onclick = function () {
            deleteItem(i);
          };

          // 버튼 영역에 버튼 넣기
          btnArea.appendChild(editBtn);
          btnArea.appendChild(deleteBtn);

          // li에 내용과 버튼 영역 넣기
          li.appendChild(text);
          li.appendChild(btnArea);

          // ul에 li 추가
          list.appendChild(li);
        }
      }

      // 데이터 추가 함수
      function addItem() {
        let input = document.getElementById("textInput");
        let value = input.value.trim();

        if (value === "") {
          // 입력값이 비어 있으면 추가하지 않음
          alert("내용을 입력하세요");
          return;
        }
        items.push(value); // 새 데이터 추가

        saveItems(); // create

        renderList(); // read

        input.value = ""; // 입력창 비우기
      }

      // update
      function editItem(index) {
        // 기존 값을 보여줌
        let newValue = prompt("수정할 내용을 입력하세요", items[index]);

        if (newValue === null) {
          // 취소 누르면 종료
          return;
        }

        newValue = newValue.trim(); // 앞뒤 공백 제거

        if (newValue === "") {
          // 빈 값이면 수정 ㄴㄴ
          alert("빈 값으로 수정할 수 없습니다");
          return;
        }

        items[index] = newValue; // 핵심

        // 저장 후 다시 출력
        saveItems();
        renderList();
      }

      // delete
      function deleteItem(index) {
        let check = confirm("정말 삭제하시겠습니까?");

        if (check) {
          // 확인을 누르면 삭제
          items.splice(index, 1);

          // 저장 후 다시 출력
          saveItems();
          renderList();
        }
      }

      // 챗봇 모달 제어

      const modal = document.getElementById("chatModal");
      const openBtn = document.getElementById("openChat");
      const closeBtn = document.getElementById("closeChat");

      openBtn.addEventListener("click", () => {
        modal.style.display = "block";
      });

      closeBtn.addEventListener("click", () => {
        modal.style.display = "none";
      });

      window.addEventListener("click", (e) => {
        if (e.target === modal) {
          modal.style.display = "none";
        }
      });

      const chat = document.getElementById("chat");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");

      //  메시지 추가
      function addMessage(text, id = Date.now(), save = true) {
        const li = document.createElement("li");
        li.className = "message user";
        li.dataset.id = id;

        li.innerHTML = `
          <div class="name">나</div>
          <div class="bubble">${text}</div>
          <div class="actions">
            <button class="edit-btn" type="button">수정</button>
            <button class="delete-btn" type="button">삭제</button>
          </div>
        `;

        // 완료 토글
        li.addEventListener("click", (e) => {
          if (e.target.tagName === "BUTTON") return;
          li.classList.toggle("done");
          updateStorage();
        });

        // 수정
        li.querySelector(".edit-btn").addEventListener("click", () => {
          const currentText = li.querySelector(".bubble").textContent;
          const newText = prompt("수정할 내용을 입력하세요", currentText);
          if (!newText) return;

          li.querySelector(".bubble").textContent = newText;
          updateStorage();
        });

        // 삭제
        li.querySelector(".delete-btn").addEventListener("click", () => {
          li.remove();
          updateStorage();
        });

        chat.appendChild(li);
        chat.scrollTop = chat.scrollHeight;

        // 저장
        if (save) {
          const data = JSON.parse(localStorage.getItem("chat")) || [];
          data.push({ id, text });
          localStorage.setItem("chat", JSON.stringify(data));
        }
      }

      // 전송
      function sendMessage() {
        if (!input.value.trim()) return;

        addMessage(input.value);
        input.value = "";
      }

      sendBtn.addEventListener("click", sendMessage);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      // 불러오기
      window.addEventListener("DOMContentLoaded", () => {
        const saved = JSON.parse(localStorage.getItem("chat")) || [];

        saved.forEach((msg) => {
          addMessage(msg.text, msg.id, false);
        });
      });

      //  전체 업데이트
      function updateStorage() {
        const messages = document.querySelectorAll(".message.user");

        const arr = [];
        messages.forEach((li) => {
          arr.push({
            id: li.dataset.id,
            text: li.querySelector(".bubble").textContent,
          });
        });

        localStorage.setItem("chat", JSON.stringify(arr));
      }
    </script>
  </body>
</html>
